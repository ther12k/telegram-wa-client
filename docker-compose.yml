services:
  app:
    build: .
    environment:
      APP_ENV: production
      PORT: 3001
      DEMO_MODE: 'true'
    ports:
      - '3001:3001'
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "fetch('http://localhost:3001/health/live').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
